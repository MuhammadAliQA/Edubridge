services:
  - type: web
    name: edubridge
    env: python
    runtime: python-3.11.9

    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn edubridge.wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"