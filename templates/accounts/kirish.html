{% extends 'base.html' %}
{% block title %}Kirish — EduBridge{% endblock %}

{% block extra_css %}
<style>
.auth-wrap{min-height:calc(100vh - 78px);display:flex;align-items:center;justify-content:center;padding:40px 20px;width:100%}
.auth-box{width:100%;max-width:420px}
.auth-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:4px;display:inline-block;width:100%;background:linear-gradient(135deg,#38bdf8 0%,#818cf8 50%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-title{text-align:center;font-family:'Bricolage Grotesque',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:4px}
.auth-sub{text-align:center;color:var(--muted);font-size:.875rem;margin-bottom:28px}
.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:28px}
.divider{text-align:center;font-size:.78rem;color:var(--muted2);margin:20px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border2)}
.divider::before{left:0}.divider::after{right:0}
.auth-switch{text-align:center;margin-top:20px;font-size:.82rem;color:var(--muted)}
.auth-switch a{color:var(--blue-b);font-weight:600}
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap" style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 78px);width:100%;padding:40px 20px">
  <div class="auth-box">
    <div class="auth-logo">Edu<span class="dot">Bridge</span></div>
    <div class="auth-title" data-i18n="auth.login_title">Xush kelibsiz!</div>
    <div class="auth-sub" data-i18n="auth.login_sub">Hisobingizga kiring</div>

    <div class="auth-card">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="id_username" data-i18n="auth.username">Foydalanuvchi nomi</label>
          <input type="text" name="username" id="id_username" class="form-control" placeholder="username" data-i18n-ph="auth.username" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="id_password" data-i18n="auth.password">Parol</label>
          <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="border-radius:12px;padding:12px">
          <span data-i18n="auth.login_btn">Kirish →</span>
        </button>
      </form>

      <div class="divider" data-i18n="auth.or">yoki</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <a href="/student/royxat/" class="btn btn-ghost" style="border-radius:12px;padding:11px">📚 <span data-i18n="auth.student_btn">O'quvchi</span></a>
        <a href="/mentor/royxat/" class="btn btn-ghost" style="border-radius:12px;padding:11px">🏆 <span data-i18n="auth.mentor_btn">Mentor</span></a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
